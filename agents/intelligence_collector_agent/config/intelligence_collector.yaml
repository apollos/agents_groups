agent:
  agent_id: intelligence_collector_a_share
  agent_group: intelligence_collector

openclaw:
  # This agent must not silently inherit OpenClaw's default model.
  # Use a model ref already registered in OpenClaw, e.g. openai/gpt-5.5, deepseek/deepseek-reasoner, qwen/qwen3-max.
  model:
    primary: "deepseek/deepseek-v4-flash"
    fallbacks: ["custom-api-siliconflow-cn/Pro/zai-org/GLM-5.1"]
    require_registered: true
    allow_openclaw_default: false

runtime:
  # workspace_root can be an absolute path, "auto" to use OPENCLAW_WORKSPACE_ROOT/OPENCLAW_WORKSPACE,
  # or "openclaw" to try the OpenClaw CLI and then environment fallback. Relative runtime paths
  # are resolved against workspace_root, not process CWD.
  workspace_root: "auto"
  # Split stores: state is this Agent's private memory/checkpoint/session; bus is shared messages
  # and Tickets; data stores Demand/collection outputs. They may point to the same file for a
  # tiny local test, but production OpenClaw multi-Agent mode should keep at least state separate.
  state_sqlite_path: "data/intelligence_collector_state.db"
  bus_sqlite_path: "data/ticket_bus.db"
  data_sqlite_path: "data/intelligence_collector_data.db"
  log_dir: "logs"
  timezone: "Asia/Shanghai"
  # Rotate the agent session once it has been running longer than this (minutes; 0 disables).
  session_rotate_minutes: 720

logging:
  level: INFO
  retention_days: 14

queue:
  backend: sqlite
  consume_topics:
    - intelligence.collection
    - query.intelligence.request
  lease_seconds: 300
  retry_delay_seconds: 60
  # Publish a checkpoint.created message after every checkpoint (noisy; off by default).
  publish_checkpoint_messages: false

circuit_breaker:
  failure_threshold: 5
  cooldown_seconds: 600

# Trading calendar. Weekdays are trading days unless listed in holidays; weekend make-up
# sessions go into extra_trading_days. Keep in sync with the exchange calendar each year.
# 2026 entries follow 上交所/深交所《关于2026年部分节假日休市安排的通知》(上证公告〔2025〕45号).
# A股周末一律休市（含国家调休上班日 5/9、9/20、10/10），故 extra_trading_days 留空。
# 注意：这是 A 股日历；港股假期不同（stock_data_collector 仅覆盖 A 股，MIC 采集不依赖交易日）。
market_calendar:
  holidays:
    # 元旦 1/1-1/3
    - "2026-01-01"
    - "2026-01-02"
    # 春节 2/15-2/23
    - "2026-02-16"
    - "2026-02-17"
    - "2026-02-18"
    - "2026-02-19"
    - "2026-02-20"
    - "2026-02-23"
    # 清明 4/4-4/6
    - "2026-04-06"
    # 劳动节 5/1-5/5
    - "2026-05-01"
    - "2026-05-04"
    - "2026-05-05"
    # 端午 6/19-6/21
    - "2026-06-19"
    # 中秋 9/25-9/27
    - "2026-09-25"
    # 国庆 10/1-10/7
    - "2026-10-01"
    - "2026-10-02"
    - "2026-10-05"
    - "2026-10-06"
    - "2026-10-07"
  extra_trading_days: []

schedule:
  market_windows:
    pre_market: ["08:00", "09:25"]
    morning: ["09:30", "11:30"]
    lunch_break: ["11:30", "13:00"]
    afternoon: ["13:00", "15:00"]
    post_market: ["15:00", "20:30"]
  allow_non_trading_day_intraday: false
  allow_lunch_break_intraday: false
  allow_off_hours_intraday: false
  allow_non_trading_day_black_swan: false
  allow_lunch_break_black_swan: true
  allow_off_hours_black_swan: true

# Named cadence profiles referenced by demand.cadence_profile. When a demand names a profile,
# these override the pool-layer based defaults from the cadence section below.
cadence_profiles:
  held_sellable_default:
    market_snapshot:
      enabled: true
      bucket_size: 10m
    mic_black_swan_scan:
      enabled: true
      interval: 45m
  held_t1_locked_default:
    market_snapshot:
      enabled: true
      bucket_size: 30m
    mic_black_swan_scan:
      enabled: true
      interval: 60m
  watchlist_default:
    market_snapshot:
      enabled: true
      bucket_size: 60m
    mic_black_swan_scan:
      enabled: true
      interval: 4h

cadence:
  intraday_bucket_minutes: 10
  held_sellable_intraday_minutes: 10
  held_t1_locked_intraday_minutes: 30
  trading_candidate_intraday_minutes: 10
  watchlist_intraday_minutes: 60
  black_swan_held_sellable_minutes: 60
  black_swan_candidate_minutes: 120
  industry_deep_collect_hours: 4

# Default MIC task profiles. Demand task_profile overrides these. No budget should be
# hardcoded in agent code.
mic_task_defaults:
  deep_collect:
    focus: [risk, operating_update, policy, supply_chain]
    time_window: "30d"
    budget_profile:
      max_queries: 20
      max_links_to_read: 10
      max_model_calls: 8
  black_swan:
    focus: [risk, legal_compliance, shareholder_action]
    time_window: "7d"
    budget_profile:
      max_queries: 8
      max_links_to_read: 4
      max_model_calls: 3
  # Applied as an upper bound whenever demand.test_mode is true.
  test_mode_budget_profile:
    max_queries: 2
    max_links_to_read: 1
    max_model_calls: 1

quality:
  minimum_quality_for_public_pool: 0.80
  critical_conflict_action: quarantine_and_alert
  high_conflict_action: accept_with_review
  # Research-quality checks for MIC results (degrade to P2 accept_degraded, never reject).
  mic:
    # High/urgent priority target returning zero top_events is a coverage signal, not a pass.
    flag_high_priority_zero_events: true
    # Events whose sources cannot be traced to a URL are unverifiable evidence.
    require_source_url: true
    # High-confidence events must carry published_at, otherwise freshness can't be judged.
    require_published_at_for_high_confidence: true
    high_confidence_threshold: 0.75
    # All-media/social/unknown sourcing without official corroboration gets flagged.
    flag_low_authority_sources: true
    # V0.8 research loop: flag runs covering none (medium) or few (low) of the target's
    # tracking_variables. Low-severity issues are reported but do not degrade the decision.
    flag_tracking_variable_coverage: true
    low_variable_coverage_ratio: 0.7

intraday:
  # Agent bucket remains configurable. When the source supports 5m, Agent fetches then queries
  # stored bars and aggregates into the configured bucket. If only 15m is verified, features are
  # explicitly marked degraded.
  use_query_bars_after_fetch: true
  query_bars_trading_ready: false

market_features:
  # Legacy single threshold; kept as abnormality_score_gte default when thresholds absent.
  abnormality_ticket_threshold: 0.75
  # Multi-condition emit rules (design §7.4): any satisfied condition emits MARKET_FEATURE_TICKET.
  thresholds:
    abnormality_score_gte: 0.75
    return_abs_gte: 0.02
    amount_ratio_vs_20d_same_bucket_gte: 3.0
    distance_to_limit_up_lte: 0.015
    distance_to_limit_down_lte: 0.015
  # Conditions that additionally route the ticket to risk_control with urgent priority.
  risk_review:
    negative_return_lte: -0.025
    hit_limit_down: true
    trading_status_abnormal: true
  # Extra local-store query_bars lookups for prev-close / 20d same-bucket enrichment.
  enrichment:
    enabled: true
    prev_close_lookback_days: 10
    same_bucket_history_days: 20
  # Price-limit percentages used for limit up/down distance features.
  limit_rules:
    default_pct: 0.10
    st_pct: 0.05
    growth_board_pct: 0.20
    bse_pct: 0.30
    prefix_pct: {}

reports:
  output_dir: "reports"

capability_verification:
  # Run a real capability verification on agent startup (once per trading day).
  run_on_startup: false
  # Let runtime tick schedule a capability-check task during pre_market.
  run_pre_market: true
  stock_data_collector:
    # Set these to a recent trading day before running tools verify-capabilities.
    ticker: "600519.SH"
    start_date: "2026-06-01"
    end_date: "2026-06-01"
    frequencies: ["5m", "15m"]
    fallback_order: ["5m", "15m", "none"]
    unverified_default_frequency: "15m"
    # Individual non-frequency checks (design §9.4).
    checks:
      cli_available: true
      eastmoney_cookie: false
      trading_status: true
      historical_bars_1d: true
      query_meta_summary: true

tools:
  python_executable: "python"
  market_intelligence_collector:
    enabled: true
    # Optional; MIC itself usually reads its own config/env.
    config_dir: null
    # Hard wall-clock timeout for one MIC deep collect. On timeout the task fails with a
    # retryable MIC_TIMEOUT error instead of blocking the worker indefinitely.
    timeout_seconds: 900
  stock_data_collector:
    enabled: true
    # Use an absolute path, or leave null to let stock_data_collector resolve its own config/env.
    # Do not use process-CWD-relative paths in OpenClaw multi-Agent deployments.
    config_dir: null
    # If stock_data_ingestion is not importable from OpenClaw's worker environment, set this to an
    # absolute path to the stock_data_collector project root.
    working_dir: null
    timeout_seconds: 180
  # Structured HK-connect snapshots for .HK targets (southbound holding / eligibility /
  # turnover). Requires the optional `akshare` package; disable if it is not installed.
  hk_connect_collector:
    enabled: true
    provider: akshare
