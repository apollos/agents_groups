  - {name: 高端装备, target_id: industry_high_end_equipment}
  - {name: 电力系统, target_id: industry_power_grid}
  - {name: 创新药, target_id: industry_pharma}
  - {name: 高股息央国企, target_id: industry_dividend_soe}
  - {name: 平台互联网, target_id: industry_internet_consumer}
  - {name: 资源周期, target_id: industry_resource_cycle}
  - {name: 出海制造, target_id: industry_export_manufacturing}

