# Data source selection for the daily post-market stock-data ingestion system.
#
# Phase-one scope:
#   - A-share daily/post-market data for factors.
#   - HK Stock Connect constituent HK daily bars via Tushare HK interfaces.
#   - No minute/tick/Level-2/real-time intraday trading data in the default profile.
#
# Common .env overrides:
#   STOCK_DATA_PROVIDERS=tushare,akshare,baostock
#   STOCK_DATA_PROVIDER_PRIORITY=tushare,akshare,baostock
#   STOCK_DATA_CANONICAL_PROVIDER=tushare
#   STOCK_DATA_DISABLED_PROVIDERS=joinquant
#   STOCK_DATA_ENABLE_BAOSTOCK=true
#   STOCK_DATA_ENABLE_JOINQUANT=false
#   STOCK_DATA_PROVIDERS_HISTORICAL_BARS=tushare,akshare,baostock
# Provider aliases accepted in env/config: tushare/thushare/ts, akshare/ak/akshare_tencent,
# baostock/bao/bs, joinquant/jqdata/jq.

canonical_provider: tushare

# Tushare is the canonical provider. AKShare's Tencent path and BaoStock are
# validator/supplement providers. JQData remains disabled because of cost.
provider_priority:
  - tushare
  - akshare
  - baostock
  - joinquant

active_providers:
  - tushare
  - akshare
  - baostock
  # - joinquant

# Rolling windows for the daily MVP. Market data keeps about one year plus buffer;
# financial data keeps enough quarters for TTM/year-over-year factors.
market_data_lookback_days: 400
financial_lookback_quarters: 8
default_daily_update_time: "20:30"

request_provider_overrides:
  security_master:
    - tushare
    - baostock
    - akshare
  trade_calendar:
    - tushare
    - baostock
  trading_status:
    - tushare
    - baostock
    - akshare
  historical_bars:
    - tushare
    - akshare
    - baostock
  adj_factor:
    - tushare
    - baostock
  valuation_metric:
    - tushare
    - baostock
    - akshare
  financial_statement:
    - tushare
    - baostock
  financial_indicator:
    - tushare
    - baostock
  money_flow:
    - tushare
    - akshare
  corporate_action:
    - tushare
    - baostock
  industry_concept:
    - akshare
    - baostock
  index_data:
    - tushare
    - baostock

validator_providers:
  - akshare
  - baostock
  # - joinquant
supplement_providers:
  - akshare
  - baostock
  # - joinquant

allow_field_level_merge: true
allow_fallback_when_canonical_missing: true
allow_majority_override_canonical: false
quarantine_on_critical_conflict: true
manual_review_on_trading_critical_conflict: true
minimum_quality_for_supplement: 0.65
minimum_quality_for_trading_use: 0.80

providers:
  tushare:
    enabled: true
    role: canonical
    auth_env:
      token: TUSHARE_TOKEN
    retry_attempts: 3
    timeout_seconds: 30
    rate_limit:
      requests_per_minute: 180
      burst: 20
    allow_fallback: false
    allow_cross_validation: true
    allow_field_level_supplement: false
  akshare:
    enabled: true
    role: validator_supplement
    source_preference: tencent
    auth_env: {}
    retry_attempts: 3
    timeout_seconds: 30
    rate_limit:
      requests_per_minute: 60
      burst: 10
    allow_fallback: true
    allow_cross_validation: true
    allow_field_level_supplement: true
  baostock:
    enabled: true
    role: validator_supplement
    source_scope: a_share_only
    supports_hk_daily: false
    auth_env: {}
    retry_attempts: 3
    timeout_seconds: 30
    rate_limit:
      requests_per_minute: 60
      burst: 10
    allow_fallback: true
    allow_cross_validation: true
    allow_field_level_supplement: true
  joinquant:
    enabled: false
    role: optional_future_provider
    auth_env:
      username: JQDATA_USERNAME
      password: JQDATA_PASSWORD
    retry_attempts: 3
    timeout_seconds: 30
    rate_limit:
      requests_per_minute: 120
      burst: 10
    allow_fallback: true
    allow_cross_validation: true
    allow_field_level_supplement: true
