# Model registry (spec section 11.2). No system-level "cheap/strong" tiering;
# selection is driven purely by model_policies.yaml.
model_registry:
  version: model_registry_v0.3

  # Default output-token cap for models that don't set max_output_tokens.
  # A full bundle (facts/metrics/events/relations/signals/questions/gaps) easily
  # exceeds 2k tokens; truncation produces json_invalid and wastes fallback calls.
  default_max_output_tokens: 4096

  models:
    deepseek_v4_pro:
      provider_type: openai_compatible_direct
      provider: deepseek
      endpoint: "https://api.deepseek.com"
      api_key_env: DEEPSEEK_API_KEY
      model: "deepseek-chat"
      enabled: true
      max_output_tokens: 8192
      capabilities:
        json_output: true
        tool_calling: true
        reasoning: true
      tags: [cn, reasoning, structured]

    qwen_plus:
      provider_type: openai_compatible_direct
      provider: qwen_dashscope
      endpoint: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      api_key_env: DASHSCOPE_API_KEY
      model: "qwen-plus"
      enabled: true
      max_output_tokens: 8192
      capabilities:
        json_output: true
        tool_calling: true
      tags: [cn, structured]

    siliconflow_qwen:
      provider_type: openai_compatible_direct
      provider: siliconflow
      endpoint: "https://api.siliconflow.cn/v1"
      api_key_env: SILICONFLOW_API_KEY
      model: "Qwen/Qwen3-32B"
      enabled: true
      max_output_tokens: 4096
      capabilities:
        json_output: true
      tags: [cn, platform]

    # OpenClaw gateway. MIC uses this entry's endpoint + token for vision
    # rescue extraction (scanned PDFs, embedded page images) via the
    # gateway's /v1/responses API with an x-openclaw-model override - see
    # call_governance.yaml -> vision_extract. Requires
    # gateway.http.endpoints.chatCompletions.enabled=true on the OpenClaw side.
    openclaw_research:
      provider_type: openai_compatible_gateway
      provider: openclaw
      endpoint: "http://127.0.0.1:18789/v1"
      api_key_env: OPENCLAW_GATEWAY_TOKEN
      model: "openclaw/research"
      enabled: true
      capabilities:
        chat: true
        vision: true
        gateway_routing: true
        agent_routing: true
      tags: [gateway, configurable_backend, vision]

# Rough price hints (USD per 1M tokens) used only for cost estimation/logging.
# Not used for selection.
pricing_hints:
  deepseek_v4_pro: { input: 0.27, output: 1.10 }
  qwen_plus: { input: 0.40, output: 1.20 }
  siliconflow_qwen: { input: 0.20, output: 0.20 }
  openclaw_research: { input: 0.0, output: 0.0 }
