search_providers:
  version: search_providers_v0.3

  # The active provider. "mock" produces deterministic synthetic hits so the
  # pipeline can run with no external dependency. "serpapi" / "bing" require keys.
  active: mock

  providers:
    mock:
      type: mock
      hits_per_query: 6

    serpapi:
      type: serpapi
      endpoint: "https://serpapi.com/search"
      api_key_env: SERPAPI_API_KEY
      engine: baidu
      hits_per_query: 10

    bing:
      type: bing
      endpoint: "https://api.bing.microsoft.com/v7.0/search"
      api_key_env: BING_SEARCH_API_KEY
      hits_per_query: 10
