# Query scoring weights (spec section 8.3).
# query_score = topic_priority + source_credibility_expectation + concrete_fact_expectation
#             + time_sensitivity + coverage_gap_value + entity_match - duplication_penalty
query_scoring:
  version: query_scoring_v0.3

  weights:
    topic_priority: 1.0          # multiplies family base_priority (normalized)
    entity_match: 12.0           # per distinct target entity present in query
    concrete_fact_expectation: 8.0
    source_credibility_expectation: 6.0
    time_sensitivity: 5.0
    coverage_gap_value: 10.0
    duplication_penalty: 25.0    # subtracted for (near) duplicate queries

  # Keywords that hint a query is likely to surface concrete facts.
  concrete_fact_keywords:
    - 订单
    - 合同
    - 中标
    - 金额
    - 价格
    - 涨价
    - 降价
    - 产能
    - 销量
    - 出货
    - 库存
    - 毛利率
    - 处罚
    - 投产

  # Minimum score for a query to enter the executable plan.
  min_score_to_execute: 45
